<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Row Space Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&family=Silkscreen&display=swap" rel="stylesheet">

    <!-- icon_names MUST be in alphabetical order! -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=female,history_edu,home,pets,planet,school,travel_explore" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="content">
        <h1>Front Row Space Adventure</h1>
        <div id="menu">
            <div class="menu-item">
                <a href="index.html">
                    <span class="material-symbols-outlined">home</span>
                    <br>
                    Home
                </a>
            </div>
            <div class="menu-item">
                <a href="name.html">
                    <span class="material-symbols-outlined">travel_explore</span>
                    <br>
                    Satellites
                </a>
            </div>
             <div class="menu-item">
                <a href="planets.html">
                    <span class="material-symbols-outlined" style="text-shadow:4px 4px #000000;">planet</span>
                    <br>
                    Solar<br>System
                </a>
            </div>
            <div class="menu-item">
                <a href="women-in-space.html">
                    <span class="material-symbols-outlined">female</span>
                    <br>
                    Women in<br>Space
                </a>
            </div>
            <div class="menu-item">
                <a href="animals.html">
                    <span class="material-symbols-outlined">pets</span>
                    <br>
                    Animals<br>in Space
                </a>
            </div>
            <div class="menu-item">
                <a href="history.html">
                    <span class="material-symbols-outlined">history_edu</span>
                    <br>
                    NASA<br>History
                </a>
            </div>
        </div>
        <div id="selfie-form-container">
            <label for="selfie">Take a selfie:</label>
            <input type="file" id="selfie" name="selfie" accept="image/*" capture="user">
        </div>

        <div id="selfie-container">
            <!-- helmet png source: https://www.cleanpng.com/png-portable-network-graphics-vector-graphics-clip-art-7163659/ -->
            <img id="selfie-helmet" src="img/helmet.png" alt="A transparent image of a space helmet">
            <img id="selfie-upload-by-user" src="#" alt="User's uploaded photo">
        </div>
    </div>
    <script src="js/selfie.js"></script>
</body>
</html>
